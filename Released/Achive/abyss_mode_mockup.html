
<style>
  @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap');
  .game{font-family:'Silkscreen',monospace;background:#111114;border:2px solid #2a2a2e;border-radius:8px;padding:10px;max-width:420px;margin:0 auto}
  .hud{display:grid;grid-template-columns:repeat(3,1fr);gap:3px 6px;background:#1a1a1e;border:1px solid #2a2a2e;border-radius:6px;padding:5px 8px;margin-bottom:8px}
  .hud-lbl{font-size:9px;color:#555;letter-spacing:1px}
  .hud-val{font-size:11px;color:#888;letter-spacing:1px}
  .hud-val.money{color:#6b6b50}
  .hud-val.danger{color:#7a2a2a}
  .mc-box{background:#151518;border:1px solid #2a2a2e;border-radius:6px;padding:8px;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start}
  .mc-avatar{font-size:22px;flex-shrink:0}
  .mc-name{font-size:9px;color:#444;margin-bottom:3px;letter-spacing:1px}
  .mc-text{font-size:10px;color:#666;line-height:1.5}
  .urinals{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:8px}
  .us{background:#151518;border:2px solid #2a2a2e;border-radius:6px;padding:5px 3px;display:flex;flex-direction:column;align-items:center;gap:2px}
  .us-id{font-size:8px;color:#333;letter-spacing:1px}
  .us-icon{font-size:16px}
  .us-label{font-size:8px;color:#555}
  .dirty-row{display:flex;align-items:center;gap:3px;width:100%}
  .dirty-lbl{font-size:7px;color:#444;white-space:nowrap}
  .dirty-bar-bg{flex:1;height:3px;background:#222;border-radius:2px}
  .dirty-bar{height:100%;border-radius:2px;background:#3a3a3a}
  .queue-area{background:#151518;border:1px solid #2a2a2e;border-radius:6px;padding:8px;margin-bottom:8px}
  .queue-hdr{font-size:9px;color:#444;margin-bottom:6px;letter-spacing:1px}
  .queue-list{display:flex;gap:6px}
  .cc{width:50px;background:#1a1a1e;border:2px solid #2a2a2e;border-radius:6px;padding:4px;display:flex;flex-direction:column;align-items:center;gap:2px}
  .cc-e{font-size:16px}
  .cc-tm{font-size:8px;color:#555}
  .btns{display:flex;gap:6px;margin-bottom:8px}
  .btn{flex:1;font-family:'Silkscreen',monospace;font-size:10px;background:#151518;border:1px solid #2a2a2e;color:#555;padding:7px;cursor:pointer;border-radius:4px;letter-spacing:1px;text-align:center}
  .shop-area{background:#151518;border:1px solid #2a2a2e;border-radius:6px;padding:8px;margin-bottom:8px}
  .shop-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
  .shop-lbl{font-size:9px;color:#444;letter-spacing:1px}
  .shop-bal{font-size:11px;color:#6b6b50}
  .shop-items{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
  .shop-card{background:#1a1a1e;border:1px solid #2a2a2e;border-radius:5px;padding:5px;display:flex;flex-direction:column;align-items:center;gap:2px}
  .shop-card-ico{font-size:16px}
  .shop-card-name{font-size:7px;color:#555;letter-spacing:1px}
  .shop-card-price{font-size:7px;color:#6b6b50}
  .abyss-badge{display:inline-flex;align-items:center;gap:4px;background:#1a1a1e;border:1px solid #333;border-radius:4px;padding:3px 8px;font-size:9px;color:#444;letter-spacing:2px;margin-bottom:8px}
